<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">Blog Admin Panel</h1>
                <div class="flex items-center space-x-4">
                    <a href="index.html" target="_blank" class="text-green-600 hover:text-green-700">
                        View Blog
                    </a>
                    <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Tabs -->
        <div class="mb-8">
            <nav class="flex space-x-8">
                <button class="tab-btn active" data-tab="profile">Blog Profile</button>
                <button class="tab-btn" data-tab="posts">Posts</button>
                <button class="tab-btn" data-tab="settings">Settings</button>
            </nav>
        </div>

        <!-- Profile Tab -->
        <div id="profile-tab" class="tab-content">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-6">Edit Blog Profile</h2>
                <form id="profile-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Blog Name</label>
                        <input type="text" id="blog-name" name="blogName" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Lifestyle Blog">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Author Name</label>
                        <input type="text" id="author-name" name="authorName" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Kathryn">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tagline</label>
                        <input type="text" id="tagline" name="tagline" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Your blog tagline">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">About Description</label>
                        <textarea id="about-desc" name="aboutDescription" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Tell your story..."></textarea>
                    </div>
                    <div class="flex space-x-4">
                        <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
                            Save Profile
                        </button>
                        <button type="button" id="preview-blog-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            Preview Blog
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Posts Tab -->
        <div id="posts-tab" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Manage Posts</h2>
                    <button id="add-post-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                        Add New Post
                    </button>
                </div>
                
                <!-- Add Post Form -->
                <div id="post-form-container" class="hidden mb-6 p-4 border border-gray-200 rounded-lg">
                    <form id="post-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Post Title</label>
                            <input type="text" id="post-title" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Excerpt</label>
                            <textarea id="post-excerpt" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                            <select id="post-category" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                                <option value="Lifestyle">Lifestyle</option>
                                <option value="Minimalism">Minimalism</option>
                                <option value="Food">Food</option>
                                <option value="DIY">DIY</option>
                                <option value="Tips">Tips</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Image URL</label>
                            <input type="url" id="post-image" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                        </div>
                        <div class="flex space-x-4">
                            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                                Save Post
                            </button>
                            <button type="button" id="cancel-post-btn" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Posts List -->
                <div id="posts-list" class="space-y-4">
                    <!-- Posts will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-6">Settings</h2>
                <div class="space-y-6">
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Backup Data</h3>
                        <button id="backup-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                            Download Backup
                        </button>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Reset Data</h3>
                        <button id="reset-btn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
                            Reset All Data
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/blog-admin.js"></script>
</body>
</html>
