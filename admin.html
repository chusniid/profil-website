<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Portofolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">Admin Panel</h1>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600">Selamat datang, Admin</span>
                    <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Tabs -->
        <div class="mb-8">
            <nav class="flex space-x-8">
                <button class="tab-btn active" data-tab="profile">Profil</button>
                <button class="tab-btn" data-tab="portfolio">Portofolio</button>
                <button class="tab-btn" data-tab="settings">Pengaturan</button>
            </nav>
        </div>

        <!-- Profile Tab -->
        <div id="profile-tab" class="tab-content">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-6">Edit Profil</h2>
                <form id="profile-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nama</label>
                        <input type="text" id="profile-name" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Masukkan nama Anda">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Judul Hero</label>
                        <input type="text" id="hero-title-input" name="heroTitle" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Contoh: Halo, Saya John Doe">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Subtitle Hero</label>
                        <input type="text" id="hero-subtitle-input" name="heroSubtitle" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Contoh: Web Developer & Designer">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Deskripsi Tentang</label>
                        <textarea id="about-desc-input" name="aboutDescription" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Ceritakan tentang diri Anda..."></textarea>
                    </div>
                    <div class="flex space-x-4">
                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            Simpan Profil
                        </button>
                        <button type="button" id="preview-btn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
                            Lihat Website
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Portfolio Tab -->
        <div id="portfolio-tab" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Kelola Portofolio</h2>
                    <button id="add-portfolio-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                        Tambah Proyek
                    </button>
                </div>
                
                <!-- Add Portfolio Form -->
                <div id="portfolio-form-container" class="hidden mb-6 p-4 border border-gray-200 rounded-lg">
                    <form id="portfolio-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Judul Proyek</label>
                            <input type="text" id="project-title" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Deskripsi</label>
                            <textarea id="project-description" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">URL Gambar</label>
                            <input type="url" id="project-image" class="w-full px-4 py-2 border border-gray-300 rounded-lg" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Link Demo</label>
                            <input type="url" id="project-demo" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div class="flex space-x-4">
                            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                                Simpan Proyek
                            </button>
                            <button type="button" id="cancel-portfolio-btn" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600">
                                Batal
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Portfolio List -->
                <div id="portfolio-list" class="space-y-4">
                    <!-- Portfolio items will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Settings Tab -->
        <div id="settings-tab" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-6">Pengaturan</h2>
                <div class="space-y-6">
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Backup Data</h3>
                        <button id="backup-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                            Download Backup
                        </button>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold mb-4">Reset Data</h3>
                        <button id="reset-btn" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
                            Reset Semua Data
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/admin.js"></script>
</body>
</html>
